<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI-compatible chat — gu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-brand: #22d3ee;
            --color-surface: #0c0c0f;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .thinking-shimmer {
            background: linear-gradient(90deg, #27272a 0%, #3f3f46 50%, #27272a 100%);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 80%, 100% { opacity: 0.35; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1); }
        }
        .thinking-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
        .thinking-chevron { transition: transform 0.2s ease-out; }
        details[open] .thinking-chevron { transform: rotate(180deg); }
        .prose-chat {
            font-size: 0.9375rem;
            line-height: 1.65;
        }
        .prose-chat pre { margin: 0.75rem 0; border-radius: 0.5rem; overflow-x: auto; }
        .prose-chat code { font-size: 0.8125rem; }
        .prose-chat p { margin: 0.5rem 0; }
        .prose-chat ul, .prose-chat ol { margin: 0.5rem 0; padding-left: 1.25rem; }
        .prose-chat h1, .prose-chat h2, .prose-chat h3 { margin-top: 1rem; margin-bottom: 0.5rem; font-weight: 600; }
        .prose-chat a { color: #22d3ee; text-decoration: underline; text-underline-offset: 2px; }
        .prose-chat blockquote {
            border-left: 3px solid #3f3f46;
            margin: 0.5rem 0;
            padding-left: 0.75rem;
            color: #a1a1aa;
        }
        .prose-chat table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; font-size: 0.875rem; }
        .prose-chat th, .prose-chat td { border: 1px solid #3f3f46; padding: 0.35rem 0.5rem; }
        .prose-chat th { background: #18181b; }
    </style>
    <script>
        (function () {
            const purifyCfg = {
                ADD_TAGS: ['use'],
                ADD_ATTR: ['class', 'target', 'rel', 'href', 'colspan', 'rowspan'],
            };
            if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
                marked.setOptions({
                    gfm: true,
                    breaks: true,
                    highlight: function (code, lang) {
                        try {
                            if (lang && hljs.getLanguage(lang)) {
                                return hljs.highlight(code, { language: lang }).value;
                            }
                            return hljs.highlightAuto(code).value;
                        } catch {
                            return code;
                        }
                    },
                });
            }
            window.Markdown = {
                render: function (md) {
                    if (!md) return '';
                    const raw = marked.parse(md);
                    return DOMPurify.sanitize(raw, purifyCfg);
                },
            };
        })();
    </script>
    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject)
            .then(result => go.run(result.instance));
    </script>
</head>
<body class="bg-[#0c0c0f] text-zinc-100 antialiased min-h-screen">
    <div id="app"></div>
</body>
</html>
